name: Build the flutter version of the RustDesk

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"

concurrency:
  group: flutter-build-${{ github.ref }}
  cancel-in-progress: true

env:
  SCITER_RUST_VERSION: "1.75" 
  RUST_VERSION: "1.75" 
  MAC_RUST_VERSION: "1.81" 
  CARGO_NDK_VERSION: "3.1.2"
  SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
  SCITER_NASM_DEBVERSION: "2.15.05-1"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag || 'nightly' }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  UPLOAD_ARTIFACT: "${{ github.event_name == 'push' || inputs.upload-artifact != false }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}-2"

permissions:
  contents: write

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: ${{ github.event_name == 'push' || inputs.upload-artifact != false }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10
    strategy:
      fail-fast: false

  build-for-windows-flutter:
    name: x86_64-pc-windows-msvc
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022
    env:
      DIST_DIR: aro-nexus
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: bridge_temp

      - name: Distribuir arquivos da Ponte (Definitivo)
        shell: bash
        run: |
          echo "Copiando arquivos Rust (.rs) para src/ ..."
          cp bridge_temp/bridge_generated*.rs src/ 2>/dev/null || true
          cp bridge_temp/src/bridge_generated*.rs src/ 2>/dev/null || true
          
          echo "Copiando arquivos Dart (.dart) para flutter/lib/ ..."
          cp bridge_temp/generated_bridge*.dart flutter/lib/ 2>/dev/null || true
          cp bridge_temp/flutter/lib/generated_bridge*.dart flutter/lib/ 2>/dev/null || true
          
          echo "Verificando se os arquivos chegaram nos lugares certos:"
          ls -la src/ | grep bridge || true
          ls -la flutter/lib/ | grep bridge || true

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter))) || true
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg ARO Otimizado
        shell: bash
        run: |
          rm -rf /c/vcpkg || true
          mkdir -p /c/vcpkg
          git clone https://github.com/microsoft/vcpkg.git /c/vcpkg
          cd /c/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          for i in {1..3}; do
            curl -L -o vcpkg.exe https://github.com/microsoft/vcpkg-tool/releases/download/2025-01-11/vcpkg.exe && break
            sleep 10
          done
          VCPKG_WIN_PATH=$(cygpath -w "/c/vcpkg")
          echo "VCPKG_ROOT=$VCPKG_WIN_PATH" >> $GITHUB_ENV
          echo "$VCPKG_WIN_PATH" >> $GITHUB_PATH

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true
        shell: bash

      - name: Build rustdesk
        id: build_rustdesk
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $log = Join-Path $env:GITHUB_WORKSPACE 'build-windows.log'
          $buildOk = $false

          New-Item -ItemType File -Path $log -Force | Out-Null

          function Invoke-Logged([scriptblock]$Script, [string]$Name) {
            Write-Host ">>> $Name"
            & $Script 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) {
              throw "$Name failed with exit code $LASTEXITCODE"
            }
          }

          try {
            Push-Location flutter
            if (Test-Path .dart_tool) { Remove-Item -Recurse -Force .dart_tool }
            Invoke-Logged { flutter clean } 'flutter clean'
            Invoke-Logged { flutter pub get } 'flutter pub get'
            Pop-Location

            Invoke-Logged { python .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack } 'python build.py (flutter/windows)'

            Invoke-Logged { mv ./flutter/build/windows/x64/runner/Release "./$env:DIST_DIR" } 'move windows runner output'

            Invoke-Logged { Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip } 'download usbmmidd_v2'
            Invoke-Logged { Expand-Archive usbmmidd_v2.zip -DestinationPath . } 'extract usbmmidd_v2'
            Invoke-Logged { Remove-Item -Path usbmmidd_v2\Win32 -Recurse } 'remove usbmmidd_v2\\Win32'
            Invoke-Logged { Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat" } 'remove usbmmidd_v2 tools'
            Invoke-Logged { mv -Force .\usbmmidd_v2 "./$env:DIST_DIR" } 'move usbmmidd_v2 into output'

            try {
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums
              $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
              $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
              $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
              $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
              if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
                  Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
                  mkdir "./$env:DIST_DIR/drivers"
                  mv -Force .\rustdesk_printer_driver_v4-1.4 "./$env:DIST_DIR/drivers/RustDeskPrinterDriver"
                  Expand-Archive printer_driver_adapter.zip -DestinationPath .
                  mv -Force .\printer_driver_adapter.dll "./$env:DIST_DIR"
              }
            } catch { Write-Host "Ignore the printer driver error." }

            $buildOk = $true
          } catch {
            Write-Host "Build failed: $($_.Exception.Message)"
            if (Test-Path $log) {
              Write-Host "Last 200 lines of build-windows.log:"
              Get-Content $log -Tail 200 | ForEach-Object { Write-Host "::error::$_" }
            } else {
              Write-Host "::error::build-windows.log not found"
            }
          }
          
          $buildOkValue = if ($buildOk) { 'true' } else { 'false' }
          "build_ok=$buildOkValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "BUILD_OK=$buildOkValue" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "build_ok=$buildOkValue"
          try {
            Write-Host "GITHUB_OUTPUT path: $env:GITHUB_OUTPUT"
            if (Test-Path $env:GITHUB_OUTPUT) {
              Write-Host "GITHUB_OUTPUT (tail):"
              Get-Content $env:GITHUB_OUTPUT -Tail 5 | ForEach-Object { Write-Host $_ }
            }
          } catch { }
          exit 0

      - name: Upload windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aro-nexus-build-log-windows-x86_64
          path: build-windows.log
          if-no-files-found: ignore

      - name: Fail if build failed
        if: always()
        shell: pwsh
        run: |
          Write-Host "BUILD_OK=$env:BUILD_OK"
          if ("$env:BUILD_OK" -ne "true") { exit 1 }

      - name: Rename main executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dist = Join-Path $env:GITHUB_WORKSPACE $env:DIST_DIR
          $target = Join-Path $dist 'ARO Nexus.exe'
          $candidates = @('rustdesk.exe', 'RustDesk.exe', 'Runner.exe')
          $source = $candidates |
            ForEach-Object { Join-Path $dist $_ } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $source) {
            Write-Host "Main exe not found in $dist"
            Get-ChildItem -Force $dist -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize
            exit 1
          }
          if (-not (Test-Path $target)) {
            Write-Host "Rename $source -> $target"
            Move-Item -Force $source $target
          } else {
            Write-Host "Target exe already exists: $target"
          }

      - name: find Runner.res
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" == "" ]; then echo "Runner.res: not found"; else cp $runner_res ./libs/portable/Runner.res; fi

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@v4
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          name: topmostwindow-artifacts
          path: "./${{ env.DIST_DIR }}"

      - name: Upload unsigned
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aro-nexus-unsigned-windows-x86_64
          path: ${{ env.DIST_DIR }}

      - name: Sign ARO Nexus files
        if: env.UPLOAD_ARTIFACT == 'true' && env.SIGN_BASE_URL != '-2'
        shell: bash
        run: |
          python -m pip install requests argparse
          BASE_URL=${{ env.SIGN_BASE_URL }} SECRET_KEY=${{ secrets.SIGN_SECRET_KEY }} python res/job.py sign_files ./${{ env.DIST_DIR }}/

      - name: Build self-extracted executable
        shell: pwsh
        if: env.UPLOAD_ARTIFACT == 'true'
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Stop'
          $log = Join-Path $env:GITHUB_WORKSPACE 'portable-pack.log'
          $portableOk = $false

          New-Item -ItemType File -Path $log -Force | Out-Null

          function Invoke-Logged([scriptblock]$Script, [string]$Name) {
            Write-Host ">>> $Name"
            & $Script 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) {
              throw "$Name failed with exit code $LASTEXITCODE"
            }
          }

          try {
            Invoke-Logged { python --version } 'python --version'
            Invoke-Logged { python -m pip --version } 'python -m pip --version'

            $manifestPath = Join-Path $env:GITHUB_WORKSPACE 'res/manifest.xml'
            if (Test-Path $manifestPath) {
              Write-Host "Update manifest.xml (remove dpiAware)"
              (Get-Content $manifestPath) | Where-Object { $_ -notmatch 'dpiAware' } | Set-Content -Path $manifestPath -Encoding utf8
            }

            if ([string]::IsNullOrWhiteSpace($env:DIST_DIR)) {
              throw "DIST_DIR is empty"
            }
            $distDir = Join-Path $env:GITHUB_WORKSPACE $env:DIST_DIR
            if (-not (Test-Path $distDir)) {
              throw "DIST_DIR path not found: $distDir"
            }
            $exeOld = Join-Path $distDir 'rustdesk.exe'
            $exeNew = Join-Path $distDir 'ARO Nexus.exe'
            if ((Test-Path $exeOld) -and (-not (Test-Path $exeNew))) {
              Write-Host "Rename rustdesk.exe -> ARO Nexus.exe"
              Move-Item -Force $exeOld $exeNew
            }
            $exeName = Split-Path -Leaf $exeNew

            Push-Location (Join-Path $env:GITHUB_WORKSPACE 'libs/portable')
            Invoke-Logged { rustup toolchain install $env:MAC_RUST_VERSION } "rustup toolchain install $env:MAC_RUST_VERSION"
            Invoke-Logged { rustup override set $env:MAC_RUST_VERSION } "rustup override set $env:MAC_RUST_VERSION"
            Invoke-Logged { python -m pip install -r requirements.txt } 'pip install -r requirements.txt'
            Invoke-Logged { python ./generate.py -f $distDir -o . -e $exeName } 'python generate.py'
            Pop-Location

            $signOutput = Join-Path $env:GITHUB_WORKSPACE 'SignOutput'
            New-Item -ItemType Directory -Path $signOutput -Force | Out-Null
            $packerCandidates = @()
            $portableTarget = Join-Path $env:GITHUB_WORKSPACE 'libs/portable/target'
            if (Test-Path $portableTarget) {
              $packerCandidates += Get-ChildItem -Recurse -File -Path $portableTarget -Filter 'rustdesk-portable-packer.exe' -ErrorAction SilentlyContinue
            }
            $rootTarget = Join-Path $env:GITHUB_WORKSPACE 'target'
            if (Test-Path $rootTarget) {
              $packerCandidates += Get-ChildItem -Recurse -File -Path $rootTarget -Filter 'rustdesk-portable-packer.exe' -ErrorAction SilentlyContinue
            }
            $packer = $packerCandidates | Select-Object -First 1
            if (-not $packer) {
              throw "rustdesk-portable-packer.exe not found (searched libs/portable/target and target)"
            }
            $portableOut = Join-Path $signOutput ("aro-nexus-{0}-x86_64.exe" -f $env:VERSION)
            ("Portable packer: {0}" -f $packer.FullName) | Tee-Object -FilePath $log -Append | ForEach-Object { Write-Host $_ }
            ("Copy portable packer -> {0}" -f $portableOut) | Tee-Object -FilePath $log -Append | ForEach-Object { Write-Host $_ }
            Copy-Item -Force $packer.FullName $portableOut
            if (-not (Test-Path $portableOut)) {
              throw "portable output exe not found after copy: $portableOut"
            }

            $portableOk = $true
          } catch {
            "Portable pack failed: $($_.Exception.Message)" | Tee-Object -FilePath $log -Append | ForEach-Object { Write-Host $_ }
            Write-Host "Directory listings:"
            try { Write-Host "DIST_DIR=$env:DIST_DIR" } catch { }
            try { Get-ChildItem -Force (Join-Path $env:GITHUB_WORKSPACE $env:DIST_DIR) -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize } catch { }
            try { Get-ChildItem -Force (Join-Path $env:GITHUB_WORKSPACE 'libs/portable/target/release') -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize } catch { }
            try { Get-ChildItem -Force (Join-Path $env:GITHUB_WORKSPACE 'libs/portable/target/x86_64-pc-windows-msvc/release') -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize } catch { }
            try { Get-ChildItem -Force (Join-Path $env:GITHUB_WORKSPACE 'target/release') -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize } catch { }
            try { Get-ChildItem -Force (Join-Path $env:GITHUB_WORKSPACE 'target/x86_64-pc-windows-msvc/release') -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize } catch { }
          }

          $portableOkValue = if ($portableOk) { 'true' } else { 'false' }
          Add-Content -Path $env:GITHUB_ENV -Value ("PORTABLE_OK={0}" -f $portableOkValue) -Encoding utf8
          ("PORTABLE_OK={0}" -f $portableOkValue) | Tee-Object -FilePath $log -Append | ForEach-Object { Write-Host $_ }
          exit 0

      - name: Upload portable pack log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aro-nexus-portable-pack-log-windows-x86_64
          path: portable-pack.log
          if-no-files-found: ignore

      - name: Fail if portable pack failed
        if: always()
        shell: pwsh
        run: |
          Write-Host "PORTABLE_OK=$env:PORTABLE_OK"
          if ("$env:PORTABLE_OK" -ne "true") { exit 1 }

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build msi
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../${{ env.DIST_DIR }}
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          mv ./Package/bin/x64/Release/en-us/Package.msi ../../SignOutput/aro-nexus-${{ env.VERSION }}-x86_64.msi

      - name: Sign ARO Nexus self-extracted file
        if: env.UPLOAD_ARTIFACT == 'true' && env.SIGN_BASE_URL != '-2'
        shell: bash
        run: |
          BASE_URL=${{ env.SIGN_BASE_URL }} SECRET_KEY=${{ secrets.SIGN_SECRET_KEY }} python res/job.py sign_files ./SignOutput

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ./SignOutput/aro-nexus-*.msi
            ./SignOutput/aro-nexus-*.exe
