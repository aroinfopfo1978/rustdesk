name: Build the flutter version of the RustDesk (ARO Otimizado)

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"

env:
  SCITER_RUST_VERSION: "1.75" 
  RUST_VERSION: "1.75" 
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  TAG_NAME: "${{ inputs.upload-tag || 'nightly' }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact != false }}
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  build-for-windows-flutter:
    name: Windows x64 Flutter
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fixar commit e Configurar ARO Tecnologia
        shell: bash
        run: |
          git reset --hard 64faa8c
          git submodule update --recursive
          sed -i "s#RENDEZVOUS_SERVER = .*#RENDEZVOUS_SERVER = '34.61.184.16';#g" libs/hbb_common/src/config.rs
          sed -i "s#RS_PUB_KEY = .*#RS_PUB_KEY = 'P/JrM90p485btxQEXe3IQ9No5rcyhv9nHJhbis0oKS4=';#g" libs/hbb_common/src/config.rs
          sed -i "s#API_SERVER = .*#// API_SERVER removido - BetterDesk#g" libs/hbb_common/src/config.rs

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Prepare Flutter Engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Setup vcpkg
        shell: bash
        run: |
          rm -rf /c/vcpkg || true
          git clone https://github.com/microsoft/vcpkg.git /c/vcpkg
          cd /c/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $GITHUB_ENV
          echo "C:\vcpkg" >> $GITHUB_PATH

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows-static --x-install-root="C:\vcpkg\installed"

      - name: Build rustdesk (SOLUÇÃO ERRO URI)
        run: |
          cd flutter
          flutter pub get
          cd ..
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk

      - name: Download RustDeskTempTopMostWindow artifacts
        uses: actions/download-artifact@master
        with:
          name: topmostwindow-artifacts
          path: "./rustdesk"

      - name: Upload Final Artifact
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-ARO-Windows-x64
          path: rustdesk
