name: Flutter Build (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    env:
      RUST_VERSION: 1.75.0
      FLUTTER_VERSION: 3.24.5

    steps:
      # 1. Checkout correto com submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Garantir submodules (evita erro flutter_hbb)
      - name: Update submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --force

      # 3. Instalar Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # 4. Instalar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # 5. Cache Flutter (opcional mas recomendado)
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter/bin/cache
          key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      # 6. Instalar dependências do Flutter
      - name: Flutter pub get
        run: |
          cd flutter
          flutter clean
          flutter pub get

      # 7. Validar se flutter_hbb existe (debug crítico)
      - name: Check flutter_hbb
        run: |
          dir flutter
          dir flutter\libs
          dir flutter\flutter_hbb

      # 8. Build bridge (ESSENCIAL)
      - name: Generate bridge
        run: |
          cd flutter
          dart run build_runner build --delete-conflicting-outputs

      # 9. Build RustDesk (Flutter + Rust)
      - name: Build RustDesk
        run: |
          cd flutter
          flutter build windows --release

      # 10. Upload artefato
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: |
            flutter/build/windows/x64/runner/Release/
