name: 🚀 Build RustDesk Flutter - ARO Tecnologia

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/flutter-build.yml'
      - 'flutter/**'
      - 'src/**'
      - 'libs/**'
      - 'Cargo.toml'
      - 'res/**'
  workflow_dispatch:
    inputs:
      skip_bridge:
        description: 'Pular geração de bridge?'
        type: boolean
        default: true
      debug_mode:
        description: 'Modo Debug (build mais rápido)?'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  FLUTTER_VERSION: "3.19.0"
  VERSION: "1.3.2"
  # ⚠️ CONFIGURAÇÕES DO SERVIDOR BETTERDESK - VERIFIQUE ANTES DE COMMITAR
  SERVER_IP: "34.61.184.16"
  SERVER_KEY: "P/JrM90p485btxQEXe3IQ9No5rcyhv9nHJhbis0oKS4="
  API_PORT: "21121"
  WEB_PORT: "5000"

jobs:
  # ========== VALIDAÇÃO RÁPIDA (FAIL-FAST) ==========
  validate-config:
    name: 🔍 Validar Configurações (Fail-Fast)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rápido (apenas arquivos essenciais)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flutter/lib/common.dart
          sparse-checkout-cone-mode: false

      - name: 🛡️ Validar arquivo common.dart existe
        run: |
          if [ ! -f "flutter/lib/common.dart" ]; then
            echo "❌ ERRO CRÍTICO: flutter/lib/common.dart não encontrado!"
            exit 1
          fi
          echo "✅ Arquivo common.dart encontrado"

      - name: 🛡️ Validar variáveis de configuração
        run: |
          echo "🔍 Verificando configurações:"
          echo "  Server IP: ${{ env.SERVER_IP }}"
          echo "  API Port: ${{ env.API_PORT }}"
          echo "  Web Port: ${{ env.WEB_PORT }}"
          
          # Validação básica do IP
          if [[ ! "${{ env.SERVER_IP }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "⚠️ AVISO: IP do servidor não parece válido: ${{ env.SERVER_IP }}"
          fi
          
          # Validação da chave (deve ter tamanho razoável)
          if [ ${#SERVER_KEY} -lt 32 ]; then
            echo "❌ ERRO: Chave muito curta! Verifique SERVER_KEY"
            exit 1
          fi
          
          echo "✅ Todas as validações passaram!"

  # ========== GERAÇÃO DE BRIDGE (CONDICIONAL) ==========
  generate-bridge:
    name: 🌉 Gerar Bridge Flutter-Rust
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_bridge }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('Cargo.lock') }}
        
      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 || echo "⚠️ Já instalado"
        
      - name: Generate bridge
        run: |
          cd flutter
          if [ ! -f "../src/flutter_ffi.rs" ]; then
            echo "❌ ERRO: ../src/flutter_ffi.rs não encontrado!"
            exit 1
          fi
          flutter_rust_bridge_codegen \
            --rust-input ../src/flutter_ffi.rs \
            --dart-output ./lib/generated_bridge.dart \
            --rust-output ../src/bridge_generated.rs
          
          echo "✅ Bridge gerada com sucesso!"

  # ========== BUILD PRINCIPAL ==========
  build-windows:
    name: 🪟 Build Windows ${{ matrix.arch }}
    needs: [validate-config, generate-bridge]
    if: |
      always() && 
      (needs.validate-config.result == 'success' || needs.validate-config.result == 'skipped') &&
      (needs.generate-bridge.result == 'success' || needs.generate-bridge.result == 'skipped')
    runs-on: windows-2022
    strategy:
      fail-fast: true  # Para no primeiro erro
      matrix:
        arch: [x64]
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
            flutter-arch: windows-x64
    
    steps:
      - name: 📥 Checkout completo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ========== VALIDAÇÃO PRÉ-BUILD ==========
      - name: 🛡️ Validar estrutura de diretórios
        shell: bash
        run: |
          echo "🔍 Validando estrutura do projeto..."
          
          # Lista de diretórios críticos
          dirs=("flutter" "flutter/lib" "flutter/windows" "res")
          for dir in "${dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ ERRO: Diretório crítico não encontrado: $dir"
              exit 1
            fi
            echo "  ✅ $dir"
          done
          
          # Verifica arquivo de configuração
          if [ ! -f "flutter/lib/common.dart" ]; then
            echo "❌ ERRO: flutter/lib/common.dart não encontrado!"
            exit 1
          fi
          echo "  ✅ flutter/lib/common.dart"
          
          echo "✅ Estrutura validada!"

      # ========== PERSONALIZAÇÃO ARO TECNOLOGIA ==========
      - name: 🎯 Personalizar para BetterDesk
        shell: bash
        run: |
          echo "🔧 Aplicando configurações ARO Tecnologia - BetterDesk..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Backup do arquivo original
          cp flutter/lib/common.dart flutter/lib/common.dart.backup
          
          # Aplica as configurações COM VERIFICAÇÃO
          CONFIG_FILE="flutter/lib/common.dart"
          
          # 1. ID Server
          if grep -q "_idServer" "$CONFIG_FILE"; then
            sed -i "s|const String _idServer = '.*';|const String _idServer = '${{ env.SERVER_IP }}';|g" "$CONFIG_FILE"
            echo "✅ ID Server configurado: ${{ env.SERVER_IP }}"
          else
            echo "⚠️ AVISO: _idServer não encontrado no arquivo"
          fi
          
          # 2. Relay Server
          if grep -q "_relayServer" "$CONFIG_FILE"; then
            sed -i "s|const String _relayServer = '.*';|const String _relayServer = '${{ env.SERVER_IP }}';|g" "$CONFIG_FILE"
            echo "✅ Relay Server configurado: ${{ env.SERVER_IP }}"
          else
            echo "⚠️ AVISO: _relayServer não encontrado no arquivo"
          fi
          
          # 3. API Server (PORTA 21121 - BetterDesk)
          if grep -q "_apiServer" "$CONFIG_FILE"; then
            sed -i "s|const String _apiServer = '.*';|const String _apiServer = 'http://${{ env.SERVER_IP }}:${{ env.API_PORT }}';|g" "$CONFIG_FILE"
            echo "✅ API Server configurado: http://${{ env.SERVER_IP }}:${{ env.API_PORT }}"
          else
            echo "⚠️ AVISO: _apiServer não encontrado no arquivo"
          fi
          
          # 4. Chave de Segurança
          if grep -q "_key" "$CONFIG_FILE"; then
            sed -i "s|const String _key = '.*';|const String _key = '${{ env.SERVER_KEY }}';|g" "$CONFIG_FILE"
            echo "✅ Chave configurada: ${SERVER_KEY:0:20}..."
          else
            echo "⚠️ AVISO: _key não encontrado no arquivo"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📝 Configurações aplicadas (verificação):"
          grep -E "(_idServer|_relayServer|_apiServer|_key)" "$CONFIG_FILE" | head -4 || echo "⚠️ Não foi possível verificar"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ========== SETUP FLUTTER ==========
      - name: 📱 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 🔧 Flutter Doctor
        run: |
          flutter doctor -v
          flutter config --enable-windows-desktop

      # ========== SETUP RUST ==========
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      # ========== SETUP VCPKG (CORRIGIDO) ==========
      - name: 📚 Setup VCPKG
        shell: bash
        run: |
          echo "📦 Configurando VCPKG..."
          
          # Verifica se já existe
          if [ -d "vcpkg" ]; then
            echo "⚠️ VCPKG já existe, usando versão existente"
          else
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.bat
          fi
          
          echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV
          echo "$PWD/vcpkg" >> $GITHUB_PATH
          
          # Verifica instalação
          if [ ! -f "./vcpkg/vcpkg.exe" ]; then
            echo "❌ ERRO: vcpkg.exe não encontrado após bootstrap!"
            exit 1
          fi
          
          echo "✅ VCPKG configurado com sucesso!"
          ./vcpkg/vcpkg.exe version

      # ========== BUILD FLUTTER ==========
      - name: 🔨 Build RustDesk
        shell: bash
        run: |
          echo "🚀 Iniciando build do RustDesk (Modo: ${{ inputs.debug_mode && 'Debug' || 'Release' }})"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Prepara recursos
          mkdir -p flutter/windows/runner/resources
          
          # Copia ícone (se existir)
          if [ -f "res/logo.ico" ]; then
            cp res/logo.ico flutter/windows/runner/resources/
            cp res/logo.ico flutter/windows/runner/
            echo "✅ Ícone copiado"
          else
            echo "⚠️ Ícone não encontrado, usando padrão"
          fi
          
          # Build Flutter
          cd flutter
          
          if [ "${{ inputs.debug_mode }}" = "true" ]; then
            echo "🔨 Build Debug (mais rápido para testes)..."
            flutter build windows --debug
            BUILD_DIR="build/windows/x64/runner/Debug"
          else
            echo "🔨 Build Release..."
            flutter build windows --release
            BUILD_DIR="build/windows/x64/runner/Release"
          fi
          
          cd ..
          
          # Verifica se build foi gerado
          if [ ! -d "flutter/$BUILD_DIR" ]; then
            echo "❌ ERRO: Build não foi gerado em flutter/$BUILD_DIR"
            echo "📁 Conteúdo de flutter/build:"
            find flutter/build -type d 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ Build concluído!"
          
          # Organiza artefatos
          echo "📦 Organizando artefatos..."
          rm -rf rustdesk 2>/dev/null || true
          mkdir -p rustdesk
          
          cp -r flutter/$BUILD_DIR/* rustdesk/
          
          # Verifica o executável
          if [ ! -f "rustdesk/rustdesk.exe" ] && [ ! -f "rustdesk/flutter_windows.dll" ]; then
            echo "⚠️ AVISO: Executável não encontrado no padrão esperado"
            echo "📁 Conteúdo de rustdesk/:"
            ls -la rustdesk/
          else
            echo "✅ Executável encontrado!"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Estatísticas do build:"
          echo "  Tamanho total: $(du -sh rustdesk 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "  Arquivos: $(find rustdesk -type f | wc -l)"

      # ========== UPLOAD DE ARTEFATOS ==========
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-ARO-BetterDesk-${{ matrix.arch }}-${{ inputs.debug_mode && 'Debug' || 'Release' }}
          path: rustdesk/**
          retention-days: 30

      # ========== VERIFICAÇÃO FINAL ==========
      - name: ✅ Verificação Final
        shell: bash
        run: |
          echo "🎉 BUILD CONCLUÍDO COM SUCESSO!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Resumo:"
          echo "  ✅ Servidor: ${{ env.SERVER_IP }}"
          echo "  ✅ API Port: ${{ env.API_PORT }}"
          echo "  ✅ Painel Web: http://${{ env.SERVER_IP }}:${{ env.WEB_PORT }}"
          echo "  ✅ Build: ${{ inputs.debug_mode && 'Debug' || 'Release' }}"
          echo "  ✅ Arquitetura: ${{ matrix.arch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ========== JOB OPCIONAL: CRIAR RELEASE ==========
  create-release:
    name: 📦 Criar Release
    needs: build-windows
    if: github.event_name != 'workflow_dispatch' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: RustDesk-ARO-BetterDesk-x64-Release
          path: rustdesk-release

      - name: Compactar
        run: |
          cd rustdesk-release
          zip -r ../RustDesk-ARO-BetterDesk-Windows-x64.zip *
          cd ..
          echo "✅ Arquivo compactado: $(ls -lh RustDesk-ARO-BetterDesk-Windows-x64.zip | awk '{print $5}')"

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION }}-${{ github.run_number }}"
          name: "🚀 RustDesk ARO Tecnologia v${{ env.VERSION }} (Build ${{ github.run_number }})"
          body: |
            ## 🎯 RustDesk Personalizado - BetterDesk Server
            
            ### 📡 Configurações do Servidor
            - **Servidor:** ${{ env.SERVER_IP }}
            - **Painel Web:** http://${{ env.SERVER_IP }}:${{ env.WEB_PORT }}
            - **API:** http://${{ env.SERVER_IP }}:${{ env.API_PORT }}
            - **ID/Rendezvous:** ${{ env.SERVER_IP }}
            - **Relay:** ${{ env.SERVER_IP }}
            
            ### ✨ Características
            - ✅ Cliente Windows x64 pré-configurado
            - ✅ Conexão automática ao servidor ARO Tecnologia
            - ✅ Build otimizado e validado
            - ✅ Compatível com BetterDesk Server
            
            ### 📦 Instalação
            1. Baixe o arquivo ZIP
            2. Extraia em uma pasta
            3. Execute `rustdesk.exe`
            4. O cliente já estará configurado para seu servidor!
            
            ### 🔧 Build Information
            - **Versão Base:** ${{ env.VERSION }}
            - **Build Number:** ${{ github.run_number }}
            - **Data:** $(date +'%d/%m/%Y %H:%M')
            - **Commit:** ${{ github.sha }}
            
            ---
            *Build automatizado via GitHub Actions - ARO Tecnologia*
          files: RustDesk-ARO-BetterDesk-Windows-x64.zip
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
