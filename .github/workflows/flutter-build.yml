name: RustDesk Custom Build (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      FLUTTER_VERSION: 3.24.5
      RUST_VERSION: 1.75.0

      # 🔧 SUAS CONFIGURAÇÕES (MANTIDAS)
      RENDEZVOUS_SERVER: "SEU_IP_AQUI"
      RS_PUB_KEY: "SUA_CHAVE_PUBLICA_AQUI"

    steps:

      # =============================
      # CHECKOUT
      # =============================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Garantir submodules consistentes
        shell: bash
        run: |
          git submodule sync
          git submodule update --init --recursive --force

      # =============================
      # RUST
      # =============================
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # =============================
      # FLUTTER
      # =============================
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter/bin/cache
          key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      # =============================
      # PYTHON (build.py)
      # =============================
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =============================
      # VCPKG (OTIMIZADO - SEM TIMEOUT)
      # =============================
      - name: Instalar vcpkg (versão pré-compilada)
        shell: pwsh
        run: |
          $vcpkgDir = "C:\vcpkg"
          New-Item -ItemType Directory -Path $vcpkgDir -Force | Out-Null
          
          # Download pre-built vcpkg binary com retry logic
          $vcpkgUrl = "https://github.com/microsoft/vcpkg-tool/releases/download/2025-01-11/vcpkg.exe"
          $vcpkgPath = "$vcpkgDir\vcpkg.exe"
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          
          while ($retryCount -lt $maxRetries -and -not $success) {
            try {
              Write-Host "Tentativa $($retryCount + 1)/$maxRetries para baixar vcpkg.exe..."
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri $vcpkgUrl -OutFile $vcpkgPath -TimeoutSec 120 -ErrorAction Stop
              Write-Host "✅ vcpkg.exe baixado com sucesso"
              $success = $true
            } catch {
              $retryCount++
              if ($retryCount -lt $maxRetries) {
                Write-Host "⚠️ Falha no download, aguardando 10 segundos antes de tentar novamente..."
                Start-Sleep -Seconds 10
              } else {
                Write-Host "❌ Falha ao baixar vcpkg após $maxRetries tentativas"
                throw $_
              }
            }
          }

      - name: Integrar vcpkg
        shell: cmd
        run: C:\vcpkg\vcpkg integrate install

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # =============================
      # VALIDAR ESTRUTURA (EVITA TEU ERRO)
      # =============================
      - name: Validar estrutura Flutter
        shell: bash
        run: |
          if [ ! -d "flutter" ]; then
            echo "ERRO: pasta flutter não encontrada"
            exit 1
          fi

          ls flutter

      # =============================
      # FLUTTER DEPENDÊNCIAS
      # =============================
      - name: Flutter pub get
        shell: bash
        run: |
          cd flutter
          flutter clean
          flutter pub get

      # =============================
      # BUILD (OFICIAL RUSTDESK)
      # =============================
      - name: Build RustDesk
        shell: cmd
        run: |
          python build.py --flutter --portable

      # =============================
      # OUTPUT
      # =============================
      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-build
          path: target\release\