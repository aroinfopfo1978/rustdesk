name: RustDesk Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      RUST_VERSION: 1.75.0
      FLUTTER_VERSION: 3.24.5

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --force

      # Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # Python (necessário pro build.py)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # vcpkg (DEPENDÊNCIA CRÍTICA)
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Integrate vcpkg
        run: C:\vcpkg\vcpkg integrate install

      # Cache vcpkg
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}

      # Dependências Flutter
      - name: Flutter pub get
        run: |
          cd flutter
          flutter clean
          flutter pub get

      # DEBUG estrutura
      - name: Check structure
        run: |
          dir flutter
          dir flutter\libs
          dir flutter\flutter_hbb

      # Build principal (OFICIAL DO RUSTDESK)
      - name: Build RustDesk
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack

      # Output
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: target\release\
